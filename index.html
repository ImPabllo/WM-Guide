<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM-Tipp KI-Analysator Live 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-red-500">
                🏆 WM-Tipp KI-Experte
            </h1>
            <p class="text-gray-400 mt-2">Datengestützte Analysen, Kader-Checks & Wettquoten live per KI</p>
        </header>

        <div class="max-w-4xl mx-auto bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">📅 Kommende Top-Spiele</h2>
            <div id="spiele-liste" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-400 col-span-2 py-2">⏳ Lade aktuelle WM-Spiele live von der API...</p>
            </div>
        </div>

        <div id="analyse-bereich" class="max-w-4xl mx-auto hidden transition-all duration-300">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                    <h3 class="font-bold text-yellow-400 mb-2">📊 Wettquoten</h3>
                    <div class="flex justify-between text-sm mt-3">
                        <span>Sieg 1: <strong id="quote-1" class="text-green-400">-</strong></span>
                        <span>X: <strong id="quote-x" class="text-gray-300">-</strong></span>
                        <span>Sieg 2: <strong id="quote-2" class="text-red-400">-</strong></span>
                    </div>
                </div>

                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 md:col-span-2">
                    <h3 class="font-bold text-blue-400 mb-2">⚽ Voraussichtliche Aufstellung</h3>
                    <div class="grid grid-cols-2 text-xs gap-2 mt-2">
                        <div><span class="underline font-semibold" id="heim-name"></span>: <span id="kader-home" class="text-gray-400"></span></div>
                        <div><span class="underline font-semibold" id="gast-name"></span>: <span id="kader-away" class="text-gray-400"></span></div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-2xl relative overflow-hidden">
                <h3 class="text-2xl font-bold mb-4 text-white">Experten-Einschätzung & Tipp</h3>
                <p id="analyse-text" class="text-gray-300 leading-relaxed whitespace-pre-line">Wähle oben ein Spiel aus...</p>
            </div>
        </div>
    </div>

    <script>
        // HIER IST DIE URL JETZT EXAKT AUF DEIN BACKEND (WM-Guide-1) EINGESTELLT
        const BACKEND_URL = "https://wm-guide-1.onrender.com";

        window.onload = async function() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/matches`);
                const matches = await response.json();
                
                const spieleBereich = document.getElementById('spiele-liste');
                spieleBereich.innerHTML = ""; 
                
                if (!matches || matches.length === 0) {
                    spieleBereich.innerHTML = "<p class='text-gray-400 col-span-2 py-2'>Aktuell stehen keine Live-Spiele an.</p>";
                    return;
                }

                matches.forEach(spiel => {
                    spieleBereich.innerHTML += `
                        <button onclick="ladeAnalyse('${spiel.match_id}')" class="w-full bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-left transition font-semibold border-l-4 border-yellow-500 cursor-pointer">
                            ⚽ ${spiel.home} vs. ${spiel.away} <span class="text-xs text-gray-400 block font-normal">${spiel.date}</span>
                        </button>
                    `;
                });
            } catch (error) {
                document.getElementById('spiele-liste').innerHTML = `
                    <div class="bg-red-900/50 border border-red-500 p-4 rounded-lg col-span-2 text-red-200">
                        <p class="font-bold">❌ Verbindung fehlgeschlagen</p>
                        <p class="text-xs mt-1 bg-black/40 p-2 rounded font-mono">Details: ${error.message}</p>
                        <p class="text-xs mt-2 text-gray-400">Versuchte URL: ${BACKEND_URL}/api/matches</p>
                    </div>
                `;
                console.error(error);
            }
        };

        async function ladeAnalyse(matchId) {
            const bereich = document.getElementById('analyse-bereich');
            const textfeld = document.getElementById('analyse-text');
            bereich.classList.remove('hidden');
            textfeld.innerHTML = "⏳ Die KI analysiert gerade... Bitte warten...";

            try {
                const response = await fetch(`${BACKEND_URL}/api/analysis/${matchId}`);
                const data = await response.json();

                document.getElementById('heim-name').innerText = data.match_info.home;
                document.getElementById('gast-name').innerText = data.match_info.away;
                document.getElementById('kader-home').innerText = Array.isArray(data.kader.home) ? data.kader.home.join(', ') : data.kader.home;
                document.getElementById('kader-away').innerText = Array.isArray(data.kader.away) ? data.kader.away.join(', ') : data.kader.away;

                if (data.quoten && data.quoten.bet365) {
                    document.getElementById('quote-1').innerText = data.quoten.bet365["1"] || "Live";
                    document.getElementById('quote-x').innerText = data.quoten.bet365["X"] || "Live";
                    document.getElementById('quote-2').innerText = data.quoten.bet365["2"] || "Live";
                } else {
                    document.getElementById('quote-1').innerText = "Live";
                    document.getElementById('quote-x').innerText = "Live";
                    document.getElementById('quote-2').innerText = "Live";
                }
                textfeld.innerText = data.analyse;
            } catch (error) {
                textfeld.innerHTML = "❌ Fehler beim Laden der Analyse.";
            }
        }
    </script>
</body>
</html>
